<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumAnchor v0.2.0 - Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; background: #f9f9f9; }
        h1 { color: #0066cc; }
        button { padding: 12px 20px; margin: 10px 5px; font-size: 1.1em; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0055aa; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        #output { margin-top: 20px; padding: 20px; background: white; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; font-family: monospace; min-height: 200px; }
    </style>
</head>
<body>
    <h1>⚛️ QuantumAnchor v0.2.0 - Test Mode</h1>
    <p>A personal, experimental timeline verification framework</p>
    
    <button onclick="initializeSystem()">Initialize QuantumAnchor</button>
    <button onclick="runAnalysis()">Run Statistical Analysis (Phase 3)</button>
    
    <h2 style="margin-top: 30px;">Quick Log Experience</h2>
    <input type="text" id="quickDesc" placeholder="Describe the synchronicity or experience (e.g. Thought of Twin, then saw lightning bolt emoji)">
    <input type="number" id="quickIntensity" placeholder="Intensity 1-10" min="1" max="10" value="5">
    <button onclick="logQuick()">Log Quick Experience</button>
    
    <div id="output">Click a button to start...</div>

    <script>
        // Inline minimal version of QuantumAnchor with quick log support
        class QuantumAnchor {
            constructor() {
                this.initialized = false;
                this.version = '0.2.0';
                this.experiences = [];
            }
            
            async initialize() {
                this.initialized = true;
                return {
                    version: this.version,
                    status: 'ready',
                    message: 'QuantumAnchor initialized (test mode with quick log)'
                };
            }
            
            async runStatisticalAnalysis() {
                if (!this.initialized) throw new Error('Please initialize first');
                return {
                    timestamp: new Date().toISOString(),
                    measurementsAnalyzed: 150,
                    summary: {
                        overallPassRate: 0.87,
                        anomalyLevel: "Moderate anomalies detected",
                        significantPatterns: 3
                    },
                    note: "Mock output for testing"
                };
            }
            
            async logQuickExperience(description, intensity = 5) {
                if (!this.initialized) throw new Error('Please initialize first');
                if (!description || description.trim() === '') throw new Error('Description is required');
                
                const safeIntensity = Math.max(1, Math.min(10, parseInt(intensity) || 5));
                
                const experience = {
                    id: 'quick_' + Date.now(),
                    type: 'synchronicity',
                    description: description.trim(),
                    intensity: safeIntensity,
                    timestamp: new Date().toISOString(),
                    tags: ['quick-log']
                };
                
                this.experiences.push(experience);
                
                console.log('✅ Quick experience logged:', experience);
                return experience;
            }
        }

        let qa;

        async function initializeSystem() {
            const output = document.getElementById('output');
            output.textContent = 'Initializing...\n';
            
            try {
                qa = new QuantumAnchor();
                const result = await qa.initialize();
                output.textContent += '✅ Success!\n';
                output.textContent += JSON.stringify(result, null, 2);
            } catch (err) {
                output.textContent += '❌ Error: ' + err.message;
            }
        }

        async function runAnalysis() {
            const output = document.getElementById('output');
            if (!qa) {
                output.textContent = 'Please initialize first!';
                return;
            }
            
            output.textContent = 'Running Phase 3 Statistical Analysis...\n';
            
            try {
                const analysis = await qa.runStatisticalAnalysis();
                output.textContent += JSON.stringify(analysis, null, 2);
            } catch (err) {
                output.textContent += '❌ Error: ' + err.message;
            }
        }

        async function logQuick() {
            const output = document.getElementById('output');
            const desc = document.getElementById('quickDesc').value.trim();
            const intensity = document.getElementById('quickIntensity').value;
            
            if (!desc) {
                output.textContent = 'Please enter a description!';
                return;
            }
            
            if (!qa) {
                output.textContent = 'Please initialize first!';
                return;
            }
            
            output.textContent = 'Logging quick experience...\n';
            
            try {
                const experience = await qa.logQuickExperience(desc, intensity);
                output.textContent += '✅ Quick experience logged successfully!\n\n';
                output.textContent += JSON.stringify(experience, null, 2);
                
                // Clear input
                document.getElementById('quickDesc').value = '';
            } catch (err) {
                output.textContent += '❌ Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
