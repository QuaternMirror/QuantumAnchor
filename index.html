<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumAnchor v0.2.0</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h1 { color: #0066cc; }
        button { padding: 10px 15px; margin: 5px; font-size: 1em; }
        #output { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>⚛️ QuantumAnchor v0.2.0</h1>
    <p>A personal, experimental timeline verification framework</p>
    
    <button onclick="initializeSystem()">Initialize QuantumAnchor</button>
    <button onclick="runAnalysis()">Run Statistical Analysis (Phase 3)</button>
    
    <div id="output"></div>

    <script src="quantumanchor.js"></script>
    
    <script>
        let qa;

        async function initializeSystem() {
            const output = document.getElementById('output');
            output.textContent = 'Initializing...\n';
            
            try {
                qa = new QuantumAnchor();
                const result = await qa.initialize();
                output.textContent += '✅ QuantumAnchor initialized successfully!\n';
                output.textContent += JSON.stringify(result, null, 2);
            } catch (err) {
                output.textContent += '❌ Error: ' + err.message;
            }
        }

        async function runAnalysis() {
            const output = document.getElementById('output');
            if (!qa) {
                output.textContent = 'Please initialize first!';
                return;
            }
            
            output.textContent = 'Running statistical analysis...\n';
            
            try {
                const analysis = await qa.runStatisticalAnalysis();
                output.textContent += JSON.stringify(analysis, null, 2);
            } catch (err) {
                output.textContent += '❌ Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
